<h2 id="form-planta-title">Agregar nueva planta</h2>

<form id="form-planta" onsubmit="submitFormPlanta(event, this)">
    <input type="hidden" name="action_method" id="planta-action-method" value="POST"> <!-- POST=create, PUT=edit -->
    <input type="hidden" name="original_nombre_cientifico" id="planta-original-cientifico">

    <label>
        Nombre común:
        <input type="text" name="nombre" id="planta-nombre" required placeholder="Ej: Albahaca">
    </label>
    <label>
        Nombre científico:
        <input type="text" name="nombre_cientifico" id="planta-cientifico" required placeholder="Ej: Ocimum basilicum">
    </label>
    <label>
        Descripción:
        <textarea name="descripcion" id="planta-descripcion" required></textarea>
    </label>
    <label>
        Propiedades medicinales:
        <textarea name="propiedades" id="planta-propiedades"></textarea>
    </label>
    <label>
        Distribución geográfica:
        <input type="text" name="zona_geografica" id="planta-zona" placeholder="Ej: Región tropical">
    </label>
    <label>
        Género:
        <input type="text" name="genero" id="planta-genero" placeholder="Ej: Ocimum">
    </label>
    <label>
        Morfología:
        <textarea name="morfologia" id="planta-morfologia"
            placeholder="Descripción de la forma, hojas, tallo..."></textarea>
    </label>
    <label>
        Bibliografía:
        <textarea name="bibliografia" id="planta-bibliografia" placeholder="Ej: Libro de Botánica, pág. 45"
            rows="2"></textarea>
    </label>

    <h3 style="margin-top: 20px; color: #2c5e2e; border-bottom: 2px solid #eee; padding-bottom: 5px;">Detalles
        Adicionales</h3>

    <label>
        Principio Activo:
        <input type="text" name="principio_activo" id="planta-principio" placeholder="Ej: Mentol, Eucaliptol">
    </label>

    <label>
        Galería de Crecimiento (Añadir nuevas):
        <input type="file" name="galeria" id="planta-galeria" accept="image/*" multiple>
        <small style="color: #666;">Selecciona imágenes para simular el crecimiento.</small>
    </label>
    <!-- Contenedor dinámico de fotos existentes si se edita -->
    <div id="gallery-manager"
        style="margin-top:10px; display:flex; flex-direction:column; gap:10px; max-height: 300px; overflow-y: auto; padding: 5px;">
    </div>

    <div id="remedios-manager-container"
        style="display:none; margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 8px; border: 1px solid #c8e6c9;">
        <h4 style="margin-top: 0; color: #2e7d32;">Remedios Naturales</h4>
        <p>Gestiona los remedios preparados con esta planta.</p>
        <button type="button" class="btn btn-secondary" onclick="gestionarRemedios()"
            style="background: #2e7d32; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer;">
            <i class="fas fa-prescription-bottle-alt"></i> Gestionar Remedios
        </button>
    </div>

    <div style="display: flex; gap: 12px; margin-top: 24px; justify-content: center;">
        <button type="submit" class="btn-main">
            <i class="fas fa-save"></i> Guardar Planta
        </button>
        <button type="button" class="btn-secondary"
            onclick="document.getElementById('modal-dinamico').style.display='none'">
            <i class="fas fa-times"></i> Cancelar
        </button>
    </div>
</form>
