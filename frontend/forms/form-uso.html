<h2 id="form-uso-title">Agregar Nuevo Uso</h2>

<form id="form-uso" onsubmit="submitFormUso(event, this)">
    <input type="hidden" name="id" id="id_uso">

    <label>
        Nombre:
        <input type="text" name="nombre" id="uso-nombre" required placeholder="Ej: Dolor de cabeza">
    </label>

    <label>
        Tipo:
        <select name="tipo" id="uso-tipo" required
            style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1rem; background: #f5f5f5;">
            <option value="Medicinal">Medicinal</option>
            <option value="Ornamental">Ornamental</option>
            <option value="Comestible">Comestible</option>
            <option value="Industrial">Industrial</option>
            <option value="Otro">Otro</option>
        </select>
    </label>

    <label>
        Descripción:
        <textarea name="descripcion" id="uso-descripcion" required rows="3"></textarea>
    </label>

    <div style="display: flex; gap: 12px; margin-top: 24px; justify-content: center;">
        <button type="submit" class="btn-main">
            <i class="fas fa-save"></i> Guardar
        </button>
        <button type="button" class="btn-secondary"
            onclick="document.getElementById('modal-dinamico').style.display='none'">
            <i class="fas fa-times"></i> Cancelar
        </button>
    </div>
</form>
