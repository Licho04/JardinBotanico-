<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="icon" type="image/png" href="/recursos/imagenes/logo_transparente.png">
    <link rel="stylesheet" href="/recursos/estilos/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="body-inicio-sesion">

    <!-- HEADER SIMPLIFICADO -->
    <header class="encabezado">
        <div class="encabezado-izquierda">
            <img src="/recursos/imagenes/logo_transparente.png" alt="Logo Plantas Medicinales" class="logo">
            <div>
                <h1 class="titulo">Jardín de Plantas Medicinales</h1>
            </div>
        </div>
        <nav class="navegacion">
            <a href="/">Inicio</a>
            <a href="/historia.html">Historia</a>

            <a href="/login.html" class="btn-sesion" id="link-login">Iniciar Sesión</a>

            <div class="menu-hamburguesa" id="user-menu" style="display: none;">
                <button id="btn-menu">&#9776;</button>
                <div id="menu-opciones" style="display: none;">
                    <a href="/perfil.html">Perfil</a>
                    <a href="/mis-solicitudes.html" id="link-mis-solicitudes" style="display:none;">Mis Solicitudes</a>
                    <a href="#" id="btn-solicitud-donacion" style="display:none;">Solicitar Donación</a>
                    <a href="/admin.html" id="link-admin" style="display:none;">Administrador</a>
                    <a href="#" onclick="cerrarSesion()">Cerrar sesión</a>
                </div>
            </div>
        </nav>
    </header>

    <div class="contenedor-inicio">
        <h1>Iniciar Sesión</h1>

        <div id="alert-error" class="alert-error"
            style="display:none; background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px;">
            <i class="fas fa-exclamation-circle"></i> <span id="error-msg"></span>
        </div>

        <div id="alert-success" class="alert-success"
            style="display:none; background: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #34d399;">
            <i class="fas fa-check-circle"></i> <span id="success-msg"></span>
        </div>

        <form id="login-form">
            <ul>
                <li>
                    <label for="identificador">Usuario o Correo electrónico:</label>
                    <input type="text" id="identificador" name="usuario" required
                        placeholder="Ingresa tu usuario o correo">
                </li>
                <li>
                    <label for="contraseña">Contraseña:</label>
                    <input type="password" id="contraseña" name="password" required placeholder="Ingresa tu contraseña">
                </li>
            </ul>
            <button type="submit" name="enviar" value="Enviar">Entrar</button>
        </form>
        <a href="/registro.html" class="boton-nuevo-usuario">Crear nueva cuenta</a>
    </div>

    <script>
        const API_URL = '/api';

        document.addEventListener('DOMContentLoaded', () => {
            verificarSesion();
            configurarMenuHamburguesa();
        });

        // AUTENTICACIÓN
        let usuarioActual = null;
        async function verificarSesion() {
            try {
                const token = localStorage.getItem('token');
                if (!token) return;

                const res = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    usuarioActual = await res.json();
                    actualizarUIUsuario(usuarioActual);
                } else {
                    localStorage.removeItem('token');
                }
            } catch (e) { console.error('Error:', e); }
        }

        function actualizarUIUsuario(user) {
            document.getElementById('link-login').style.display = 'none';
            document.getElementById('user-menu').style.display = 'block';
            if (usuarioActual.tipo == '1' || usuarioActual.tipo === 'admin') {
                document.getElementById('link-admin').style.display = 'block';
            } else {
                let btnDonacion = document.getElementById('btn-solicitud-donacion');
                if (btnDonacion) btnDonacion.style.display = 'block';
                let linkMisSols = document.getElementById('link-mis-solicitudes');
                if (linkMisSols) linkMisSols.style.display = 'block';
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
            window.location.reload();
        }

        function configurarMenuHamburguesa() {
            var btnMenu = document.getElementById('btn-menu');
            if (btnMenu) {
                btnMenu.onclick = function () {
                    var menu = document.getElementById('menu-opciones');
                    menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
                    if (menu.style.display === 'flex') menu.style.flexDirection = 'column';
                };
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const data = Object.fromEntries(new FormData(form).entries());

            const errDiv = document.getElementById('alert-error');
            const errMsg = document.getElementById('error-msg');
            errDiv.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (res.ok) {
                    // Guardar token y usuario, luego redirigir
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('usuario', JSON.stringify(result.usuario));
                    window.location.href = result.usuario.tipo == 1 || result.usuario.tipo === 'admin' ? '/admin.html' : '/index.html';
                } else {
                    errMsg.textContent = result.error || 'Error al iniciar sesión';
                    errDiv.style.display = 'block';
                }
            } catch (error) {
                errMsg.textContent = 'Error de conexión con el servidor.';
                errDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
