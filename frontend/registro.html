<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="icon" type="image/png" href="/recursos/imagenes/logo_transparente.png">
    <link rel="stylesheet" href="/recursos/estilos/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="body-registro">

    <!-- HEADER SIMPLIFICADO -->
    <header class="encabezado">
        <div class="encabezado-izquierda">
            <img src="/recursos/imagenes/logo_transparente.png" alt="Logo Plantas Medicinales" class="logo">
            <div>
                <h1 class="titulo">Jardín de Plantas Medicinales</h1>
            </div>
        </div>
        <nav class="navegacion">
            <a href="/">Inicio</a>
            <a href="/historia.html">Historia</a>
        </nav>
    </header>

    <div class="contenedor-inicio">
        <h1>Registrarse</h1>

        <div id="alert-error" class="alert-error"
            style="display:none; background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px;">
            <i class="fas fa-exclamation-circle"></i> <span id="error-msg"></span>
        </div>

        <form id="registro-form">
            <ul>
                <li>
                    <label for="usuario">Usuario:</label>
                    <input type="text" id="usuario" name="usuario" required />
                </li>
                <li>
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" required />
                </li>
                <li>
                    <label for="correo">Correo electrónico:</label>
                    <input type="email" id="correo" name="mail" required />
                </li>
                <li>
                    <label for="contrasena">Contraseña:</label>
                    <input type="password" id="contrasena" name="password" required />
                </li>
                <li>
                    <button type="submit" name="enviar" value="Enviar">Registrarse</button>
                </li>
            </ul>
        </form>
        <a href="/login.html" class="boton-nuevo-usuario">Ya tengo cuenta</a>
    </div>

    <script>
        const API_URL = '/api';

        document.getElementById('registro-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const data = Object.fromEntries(new FormData(form).entries());

            const errDiv = document.getElementById('alert-error');
            const errMsg = document.getElementById('error-msg');
            errDiv.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/auth/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (res.ok) {
                    // Redirigir al login con éxito
                    alert('Registro completado con éxito. Ahora puedes iniciar sesión.');
                    window.location.href = '/login.html';
                } else {
                    errMsg.textContent = result.error || 'Error al registrarse';
                    errDiv.style.display = 'block';
                }
            } catch (error) {
                errMsg.textContent = 'Error de conexión con el servidor.';
                errDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
